version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./config/config.yaml:/app/config/config.yaml
    depends_on:
      - redis
      - minio
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    volumes:
      - ./config/config.yaml:/app/config/config.yaml
    depends_on:
      - redis
      - minio
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-password123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

networks:
  default:
    name: browser-testing-network

volumes:
  redis_data:
  minio_data:
